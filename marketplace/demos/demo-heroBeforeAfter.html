<!DOCTYPE html>

<body>
<main id="top">
<section data-sec="heroBeforeAfter" class="section">
<div class="wrap">
      <div class="section-head"><span class="eyebrow">See The Difference</span><h2>Drag To Reveal The Result</h2><p>Show customers the transformation in one simple swipe.</p></div>
      <div class="bahs">
        <div class="bahs-stage" data-pos="50">
          <div class="bahs-after"></div>
          <div class="bahs-before"></div>
          <div class="bahs-handle" aria-label="Before and after slider" role="slider" aria-valuemin="0" aria-valuemax="100"><span class="bahs-grip"></span></div>
        </div>
        <div class="bahs-meta">
          <div class="bahs-text"><h3 class="bahs-title">Real local transformation</h3><p class="bahs-cap">A clear look at the problem before and the finished result after the job was completed.</p></div>
          <a class="btn btn-call bahs-cta" href="#quote">Get a free quote</a>
        </div>
      </div>
    </div>
</section>
</main>

<style>
:root{
  --rose:#A84A5E;--rose-d:#7E3346;
  --disp:'Young Serif',Georgia,serif;--body:'Figtree',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
h1,h2,h3{font-family:var(--disp);font-weight:400;line-height:1.14}
a{color:var(--brand);text-decoration:none;font-weight:600}
.hidden{display:none!important}
/* topbar */
.topbar{background:var(--brand)}
.topbar .inner{max-width:880px;margin:0 auto;padding:0 22px;display:flex;align-items:center;gap:14px;height:62px}
.topbar img{height:40px;width:auto}
.topbar .sp{flex:1}
.topbar button,.topbar a{color:#E9EFEA;font-size:13.5px;font-weight:600;background:none;border:0;cursor:pointer;font-family:var(--body)}
.topbar button:hover,.topbar a:hover{color:#D9A0AC}
/* page */
.page{max-width:880px;margin:0 auto;padding:32px 22px 80px}
/* login card */
.login-card{background:var(--surf);border:1px solid var(--line);border-radius:18px;padding:32px;max-width:420px;margin:60px auto;box-shadow:var(--shadow)}
.login-card h2{font-size:22px;margin-bottom:6px}
.login-card .sub{color:var(--soft);margin-bottom:18px;font-size:14.5px}
.tin{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;font-family:var(--body);font-size:15px;color:var(--ink);background:var(--surf);margin-bottom:0}
.tin:focus{border-color:var(--brand);outline:none}
label{display:block;font-size:12px;font-weight:800;color:var(--soft);margin:12px 0 4px;text-transform:uppercase;letter-spacing:.06em}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1.5px solid var(--line);background:var(--surf);border-radius:999px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--body);color:var(--ink);transition:border-color .12s,background .12s}
.btn:hover{border-color:var(--ink)}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-d);border-color:var(--brand-d)}
.btn.rose{background:var(--rose);border-color:var(--rose);color:#fff}
.btn.rose:hover{background:var(--rose-d);border-color:var(--rose-d)}
.btn.danger{background:#fff;color:var(--bad);border-color:#E8C9C9}
.btn.danger:hover{background:var(--bad-bg)}
.btn.sm{padding:7px 13px;font-size:13px}
.btn.full{width:100%}
.btn[disabled]{opacity:.55;cursor:default}
.err{color:var(--bad);font-size:13.5px;margin-top:8px;min-height:18px}
.ok-msg{color:var(--ok);font-size:13.5px;margin-top:8px}
.divider{text-align:center;color:var(--faint);font-size:12.5px;margin:14px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--line)}
.divider::before{left:0}.divider::after{right:0}
/* site selector */
.site-sel{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:26px}
.site-sel select{flex:1;padding:10px 13px;border:1.5px solid var(--line);border-radius:10px;font-family:var(--body);font-size:15px;background:var(--surf)}
.site-sel select:focus{border-color:var(--brand);outline:none}
/* billing cards */
.bcard{background:var(--surf);border:1px solid var(--line);border-radius:var(--r);padding:22px 24px;margin-bottom:18px;box-shadow:var(--shadow)}
.bcard h2{font-size:18px;margin-bottom:14px}
.bcard h3{font-size:16px;margin-bottom:8px}
/* hosting summary */
.host-row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.host-name{font-weight:800;font-size:16px}
.host-plan{color:var(--soft);font-size:14px}
.host-amount{font-family:var(--disp);font-size:24px}
/* badge */
.badge{display:inline-flex;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}
.badge.ok{background:var(--ok-bg);color:var(--ok)}
.badge.warn{background:var(--warn-bg);color:var(--warn)}
.badge.bad{background:var(--bad-bg);color:var(--bad)}
.badge.ghost{background:#FEF9C3;color:#92400E}
.badge.grey{background:var(--surf2);color:var(--soft);border:1px solid var(--line)}
/* app rows */
.app-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:13px 0;border-top:1px solid var(--line)}
.app-row:first-of-type{border-top:0}
.app-icon{width:40px;height:40px;border-radius:11px;background:var(--brand-t);border:1px solid var(--line);display:grid;place-items:center;flex:0 0 auto}
.app-icon svg{width:20px;height:20px;stroke:var(--brand);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.app-info{flex:1;min-width:0}
.app-name{font-weight:800}
.app-meta{font-size:13px;color:var(--soft)}
.app-price{font-family:var(--disp);font-size:18px;white-space:nowrap}
.app-actions{display:flex;gap:8px;flex-wrap:wrap}
/* cycle toggle */
.cycle-toggle{display:flex;gap:2px;background:var(--surf2);border:1px solid var(--line);border-radius:999px;padding:3px;width:fit-content;margin-bottom:16px}
.cycle-toggle button{border:0;background:none;border-radius:999px;padding:8px 16px;font-weight:700;font-size:13.5px;cursor:pointer;color:var(--soft);font-family:var(--body);white-space:nowrap}
.cycle-toggle button.on{background:var(--surf);color:var(--ink);box-shadow:0 1px 4px rgba(27,36,48,.10)}
/* invoices */
.inv-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 0;border-top:1px solid var(--line);font-size:14px}
.inv-desc{flex:1}
.inv-amount{font-weight:700;white-space:nowrap}
.inv-date{color:var(--faint);font-size:13px;white-space:nowrap}
/* success banner */
.success-banner{background:var(--ok-bg);border:1px solid #C4DECB;color:var(--ok);border-radius:12px;padding:14px 18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
/* payment method */
.pm-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line)}
.pm-brand{background:var(--surf2);border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-weight:700;font-size:12.5px;text-transform:uppercase}
/* suspended banner */
.susp-banner{background:var(--bad-bg);border:1px solid #F3C0BA;color:var(--bad);border-radius:12px;padding:14px 18px;margin-bottom:20px}
.susp-banner h3{margin-bottom:4px}
/* spinner */
.spin{text-align:center;padding:40px;color:var(--soft)}
</style>

<body>

<div class="topbar">
  <div class="inner">
    <img class="leadpages-logo" data-lp-logo="auto" src="https://res.cloudinary.com/dzx6x1hou/image/upload/v1782665886/leadpages-logo-white.png" alt="LeadPages">
    <span class="sp"></span>
    <span id="top-who" style="color:#C9D2CC;font-size:13.5px"></span>
    <button id="top-signout" class="hidden">Sign out</button>
  </div>
</div>

<!-- LOGIN -->
<div id="view-login" class="page">
  <div class="login-card">
    <h2>Billing</h2>
    <p class="sub">Sign in to view and manage your subscription.</p>

    <div id="li-otp-step">
      <label for="li-email">Email</label>
      <input class="tin" id="li-email" type="email" autocomplete="username" placeholder="you@example.com">
      <button class="btn primary full" id="li-magic" style="margin-top:10px">Email me a sign-in code</button>
      <div class="divider">or use a password</div>
      <label for="li-pass">Password</label>
      <input class="tin" id="li-pass" type="password" autocomplete="current-password">
      <button class="btn primary full" id="li-pw" style="margin-top:10px">Sign in with password</button>
      <div class="err" id="li-err"></div>
    </div>

    <div id="li-code-step" class="hidden">
      <p class="ok-msg">Check your email for a sign-in code.</p>
      <label for="li-code">Code from your email</label>
      <input class="tin" id="li-code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="Paste the 6-digit code">
      <button class="btn primary full" id="li-verify" style="margin-top:10px">Verify &amp; sign in</button>
      <button class="btn full" id="li-back" style="margin-top:8px">Back</button>
      <div class="err" id="li-code-err"></div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="view-dash" class="page hidden">

  <div id="success-banner" class="success-banner hidden">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>
    <span id="success-msg">Subscription activated successfully.</span>
  </div>
  <div id="susp-banner" class="susp-banner hidden">
    <h3>Account suspended</h3>
    <p>Your account has an overdue balance. Update your payment method below to restore access.</p>
  </div>

  <!-- Site selector (if multiple sites) -->
  <div class="site-sel" id="site-sel-row">
    <select id="site-sel" aria-label="Select site"></select>
  </div>

  <div id="bill-body"><div class="spin">Loading your billing…</div></div>
</div>

<script>
(function(){
  var sb=window.supabase.createClient(window.__LP.url,window.__LP.anon);
  var $=function(id){return document.getElementById(id);};
  var USER=null, SITES=[], selectedSiteId=null, CYCLE='monthly';
  var HOST_STATUS=null, APP_STATUS=null, ACCT=null;
  var OTP_EMAIL='';

  function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
  function cents(n){return '$'+((n||0)/100).toFixed(2);}
  function dec(n){return '$'+(n||0).toFixed(2);}
  function ago(ts){if(!ts)return '';var d=Math.floor((Date.now()-new Date(ts)*1000)/1000);return new Date(ts*1000).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});}
  function show(id){['view-login','view-dash'].forEach(function(v){$(v).classList.toggle('hidden',v!==id);});}

  /* ── auth ─────────────────────────────────────────── */
  async function authToken(){
    try{var r=await sb.auth.getSession();return r.data&&r.data.session&&r.data.session.access_token||null;}catch(e){return null;}
  }
  async function billFetch(path,opts){
    var token=await authToken();
    return fetch(path,Object.assign({headers:Object.assign({'content-type':'application/json'},token?{Authorization:'Bearer '+token}:{})},opts||{}));
  }

  async function boot(){
    // handle token_hash from magic link email
    try{
      var sp=new URLSearchParams(location.search);
      var th=sp.get('token_hash');
      if(th){
        var vr=await sb.auth.verifyOtp({token_hash:th,type:sp.get('type')||'email'});
        if(!vr.error){history.replaceState(null,'','/billing'+(sp.get('site')?'?site='+sp.get('site'):''));}
      }
    }catch(e){}

    var sess=(await sb.auth.getSession()).data.session;
    if(!sess){show('view-login');return;}
    USER=sess.user;
    $('top-who').textContent=USER.email||'';
    $('top-signout').classList.remove('hidden');

    // check URL params
    var sp2=new URLSearchParams(location.search);
    var successType=sp2.get('success');
    if(successType==='app'){
      $('success-msg').textContent='App activated successfully.';
      $('success-banner').classList.remove('hidden');
    } else if(successType){
      $('success-banner').classList.remove('hidden');
    }
    var siteSlug=sp2.get('site');

    show('view-dash');
    await loadSites(siteSlug);
  }

  $('top-signout').addEventListener('click',function(){
    sb.auth.signOut().then(function(){location.reload();});
  });

  /* ── login ────────────────────────────────────────── */
  $('li-magic').addEventListener('click',async function(){
    var email=$('li-email').value.trim();
    $('li-err').textContent='';
    if(!email){$('li-err').textContent='Please enter your email.';return;}
    $('li-magic').disabled=true;
    OTP_EMAIL=email;
    var r=await sb.auth.signInWithOtp({email:email,options:{shouldCreateUser:false}});
    $('li-magic').disabled=false;
    if(r.error){$('li-err').textContent=r.error.message;return;}
    $('li-otp-step').classList.add('hidden');
    $('li-code-step').classList.remove('hidden');
  });
  $('li-pw').addEventListener('click',async function(){
    var email=$('li-email').value.trim(), pw=$('li-pass').value;
    $('li-err').textContent='';
    if(!email||!pw){$('li-err').textContent='Email and password required.';return;}
    $('li-pw').disabled=true;
    var r=await sb.auth.signInWithPassword({email:email,password:pw});
    $('li-pw').disabled=false;
    if(r.error){$('li-err').textContent=r.error.message;return;}
    USER=r.data.user;
    $('top-who').textContent=USER.email||'';
    $('top-signout').classList.remove('hidden');
    show('view-dash'); loadSites(null);
  });
  $('li-verify').addEventListener('click',async function(){
    var code=$('li-code').value.trim();
    $('li-code-err').textContent='';
    if(!code){$('li-code-err').textContent='Please enter the code from your email.';return;}
    $('li-verify').disabled=true;
    var r=await sb.auth.verifyOtp({email:OTP_EMAIL,token:code,type:'email'});
    $('li-verify').disabled=false;
    if(r.error){$('li-code-err').textContent=r.error.message;return;}
    USER=r.data.user;
    $('top-who').textContent=USER.email||'';
    $('top-signout').classList.remove('hidden');
    show('view-dash'); loadSites(null);
  });
  $('li-back').addEventListener('click',function(){
    $('li-code-step').classList.add('hidden');
    $('li-otp-step').classList.remove('hidden');
  });
  $('li-email').addEventListener('keydown',function(e){if(e.key==='Enter')$('li-pw').click();});
  $('li-pass').addEventListener('keydown',function(e){if(e.key==='Enter')$('li-pw').click();});
  $('li-code').addEventListener('keydown',function(e){if(e.key==='Enter')$('li-verify').click();});

  /* ── sites ────────────────────────────────────────── */
  async function loadSites(targetSlug){
    var r=await sb.from('sites')
      .select('id,slug,business_name,plan_key,monthly_amount,billing_status,status')
      .eq('owner_user_id',USER.id)
      .order('created_at',{ascending:true});
    SITES=(r.data||[]).filter(function(s){return !s.is_partner_home;});
    if(!SITES.length){
      $('bill-body').innerHTML='<div class="bcard"><p style="color:var(--soft)">No sites are linked to your account yet. Contact your web designer for assistance.</p></div>';
      return;
    }
    // Build selector
    $('site-sel').innerHTML=SITES.map(function(s){
      return '<option value="'+esc(s.id)+'"'+(targetSlug&&s.slug===targetSlug?' selected':'')+'>'+esc(s.business_name||s.slug)+'</option>';
    }).join('');
    if(SITES.length===1) $('site-sel-row').style.display='none';
    selectedSiteId=$('site-sel').value||SITES[0].id;
    loadBilling();
  }
  $('site-sel').addEventListener('change',function(){
    selectedSiteId=this.value; loadBilling();
  });

  /* ── load billing data ────────────────────────────── */
  async function loadBilling(){
    $('bill-body').innerHTML='<div class="spin">Loading your billing\u2026</div>';
    var [hostR,appR,acctR]=await Promise.all([
      billFetch('/api/billing/status?siteId='+encodeURIComponent(selectedSiteId)).then(function(r){return r.json();}).catch(function(){return null;}),
      billFetch('/api/billing/app-status?siteId='+encodeURIComponent(selectedSiteId)).then(function(r){return r.json();}).catch(function(){return null;}),
      billFetch('/api/billing/account?siteId='+encodeURIComponent(selectedSiteId)).then(function(r){return r.json();}).catch(function(){return null;})
    ]);
    HOST_STATUS=hostR; APP_STATUS=appR; ACCT=acctR;

    // check for suspended
    if(hostR&&hostR.accountStatus==='suspended'){
      $('susp-banner').classList.remove('hidden');
    }
    renderBilling();
  }

  /* ── render ───────────────────────────────────────── */
  function renderBilling(){
    var site=SITES.find(function(s){return s.id===selectedSiteId;});
    if(!site){$('bill-body').innerHTML='<div class="spin">Site not found.</div>';return;}
    var siteStatus=(HOST_STATUS&&HOST_STATUS.sites&&HOST_STATUS.sites.find(function(s){return s.id===selectedSiteId;}))||{};
    var html='';

    /* ── hosting plan ── */
    var planKey=siteStatus.plan_key||site.plan_key;
    var monthly=(siteStatus.monthly_amount||site.monthly_amount||0)/100;
    var bStatus=siteStatus.billing_status||site.billing_status||'none';
    html+='<div class="bcard"><div class="host-row">'
      +'<div><div class="host-name">'+esc(site.business_name||site.slug)+'</div>'
      +'<div class="host-plan">'+(planKey?('Hosting: '+esc(planKey)):'No hosting plan active')+'</div></div>'
      +(planKey?'<div class="host-amount">'+dec(monthly)+'<span style="font-size:14px;font-family:var(--body);color:var(--soft)">/mo</span></div>':'')
      +'</div>';
    html+='<div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">'
      +'<span class="badge '+(bStatus==='active'?'ok':bStatus==='past_due'?'warn':'bad')+'">'
      +(bStatus==='active'?'Active':bStatus==='past_due'?'Payment overdue':'Suspended')+'</span>';
    if(ACCT&&ACCT.payment_method){
      var pm=ACCT.payment_method;
      html+='<span class="pm-brand">'+esc(pm.brand)+'</span>'
        +'<span style="font-size:13.5px;color:var(--soft)">•••• '+esc(pm.last4)+' exp '+esc(pm.exp_month)+'/'+esc(pm.exp_year)+'</span>';
    }
    html+='</div>';
    // Stripe portal button
    html+='<div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">'
      +'<button class="btn sm" id="portal-btn">Manage payment method &amp; invoices</button>'
      +'</div></div>';

    /* ── app subscriptions ── */
    var appSubs=(APP_STATUS&&APP_STATUS.subs)||[];
    var activeSubs=appSubs.filter(function(s){return s.status==='active'||s.computed_state==='cancelling';});
    if(activeSubs.length){
      html+='<div class="bcard"><h2>Add-on apps</h2>';
      activeSubs.forEach(function(s){
        var app=(s.app_registry&&s.app_registry)||{};
        var price=s.billing_cycle==='annual'?(app.price_annual_aud||0):(app.price_monthly_aud||0);
        var interval=s.billing_cycle==='annual'?'/yr':'/mo';
        var cancelling=s.computed_state==='cancelling';
        html+='<div class="app-row">'
          +'<div class="app-icon"><svg viewBox="0 0 24 24"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"/></svg></div>'
          +'<div class="app-info">'
          +'<div class="app-name">'+esc(app.name||'App')+'</div>'
          +'<div class="app-meta">'+esc(s.billing_cycle==='annual'?'Annual':'Monthly')
          +(cancelling?' &middot; <span style="color:var(--warn)">Cancels '+new Date(s.access_until).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})+'</span>':'')
          +'</div></div>'
          +'<div class="app-price">'+dec(price)+'<span style="font-size:13px;font-family:var(--body);color:var(--soft)">'+interval+'</span></div>'
          +'<div class="app-actions">'
          +(cancelling
            ?'<button class="btn sm primary" data-reactivate="'+esc(s.app_id)+'">Reactivate</button>'
            :(s.billing_cycle==='monthly'
              ?'<button class="btn sm" data-upgrade-app="'+esc(s.app_id)+'">Switch to annual (save 2 months)</button>':'')+
              '<button class="btn sm danger" data-cancel-app="'+esc(s.app_id)+'">Cancel</button>')
          +'</div></div>';
      });
      html+='</div>';
    }

    /* ── available apps to activate ── */
    var activeIds=new Set(appSubs.map(function(s){return s.app_id;}));
    // We'll show available paid apps section dynamically (loaded separately)
    html+='<div class="bcard" id="avail-apps-card"><h2>Available add-ons</h2>'
      +'<div class="cycle-toggle"><button class="on" data-c="monthly">Monthly</button><button data-c="annual">Annual (2 months free)</button></div>'
      +'<div id="avail-apps-body"><p style="color:var(--soft)">Loading\u2026</p></div></div>';

    /* ── invoice history ── */
    if(ACCT&&ACCT.invoices&&ACCT.invoices.length){
      html+='<div class="bcard"><h2>Invoice history</h2>';
      ACCT.invoices.forEach(function(inv){
        html+='<div class="inv-row">'
          +'<div class="inv-desc">'+esc(inv.description||'Subscription')+'</div>'
          +'<span class="badge '+(inv.paid?'ok':'warn')+'">'+esc(inv.paid?'Paid':'Pending')+'</span>'
          +'<div class="inv-amount">'+cents(inv.total)+'</div>'
          +'<div class="inv-date">'+esc(new Date(inv.date*1000).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}))+'</div>'
          +(inv.url?'<a href="'+esc(inv.url)+'" target="_blank" rel="noopener" class="btn sm">View</a>':'')
          +'</div>';
      });
      html+='</div>';
    }

    $('bill-body').innerHTML=html;
    wireEvents(activeIds);
    loadAvailableApps(activeIds);
  }

  /* ── wire events ──────────────────────────────────── */
  function wireEvents(activeIds){
    // portal
    var pb=$('portal-btn');
    if(pb) pb.addEventListener('click',async function(){
      pb.disabled=true;pb.textContent='Opening\u2026';
      try{
        var r=await billFetch('/api/billing/portal',{method:'POST',body:JSON.stringify({returnUrl:location.origin+'/billing?site='+encodeURIComponent((SITES.find(function(s){return s.id===selectedSiteId;})||{}).slug||'')})});
        var j=await r.json();
        if(j&&j.url) location.href=j.url;
        else{pb.disabled=false;pb.textContent='Manage payment method & invoices';alert(j&&j.error||'Could not open portal');}
      }catch(e){pb.disabled=false;pb.textContent='Manage payment method & invoices';}
    });
    // cancel app
    document.querySelectorAll('[data-cancel-app]').forEach(function(btn){
      btn.addEventListener('click',async function(){
        if(!confirm('Cancel this app? You\'ll keep access until the end of the current period.')) return;
        btn.disabled=true;
        try{
          var r=await billFetch('/api/billing/app-cancel',{method:'POST',body:JSON.stringify({siteId:selectedSiteId,appId:btn.getAttribute('data-cancel-app')})});
          var j=await r.json();
          if(j&&j.ok) loadBilling();
          else{btn.disabled=false;alert(j&&j.error||'Could not cancel');}
        }catch(e){btn.disabled=false;}
      });
    });
    // reactivate
    document.querySelectorAll('[data-reactivate]').forEach(function(btn){
      btn.addEventListener('click',async function(){
        btn.disabled=true;
        try{
          var r=await billFetch('/api/billing/app-checkout',{method:'POST',body:JSON.stringify({siteId:selectedSiteId,appId:btn.getAttribute('data-reactivate'),cycle:CYCLE,returnUrl:location.origin})});
          var j=await r.json();
          if(j&&j.mode==='reactivated') loadBilling();
          else if(j&&j.url) location.href=j.url;
          else{btn.disabled=false;alert(j&&j.error||'Could not reactivate');}
        }catch(e){btn.disabled=false;}
      });
    });
    // upgrade to annual
    document.querySelectorAll('[data-upgrade-app]').forEach(function(btn){
      btn.addEventListener('click',async function(){
        if(!confirm('Switch to annual billing? The remaining monthly period will be credited.')) return;
        btn.disabled=true;
        try{
          var r=await billFetch('/api/billing/app-checkout',{method:'POST',body:JSON.stringify({siteId:selectedSiteId,appId:btn.getAttribute('data-upgrade-app'),cycle:'annual',returnUrl:location.origin})});
          var j=await r.json();
          if(j&&j.mode==='upgraded') loadBilling();
          else if(j&&j.url) location.href=j.url;
          else{btn.disabled=false;alert(j&&j.error||'Could not upgrade');}
        }catch(e){btn.disabled=false;}
      });
    });
    // cycle toggle
    var ct=document.querySelector('.cycle-toggle');
    if(ct) ct.addEventListener('click',function(e){
      var b=e.target.closest('[data-c]');if(!b)return;
      CYCLE=b.getAttribute('data-c');
      ct.querySelectorAll('button').forEach(function(x){x.classList.toggle('on',x===b);});
      // re-render available apps with new prices
      var avail=$('avail-apps-body');
      if(avail) avail.querySelectorAll('[data-activate]').forEach(function(btn){
        var appId=btn.getAttribute('data-activate');
        var app=btn.closest('.app-row');
        var priceEl=app&&app.querySelector('.app-price');
        var appData=_availableAppsCache&&_availableAppsCache.find(function(a){return a.id===appId;});
        if(priceEl&&appData){
          var price=CYCLE==='annual'?(appData.price_annual_aud||0):(appData.price_monthly_aud||0);
          var interval=CYCLE==='annual'?'/yr':'/mo';
          priceEl.innerHTML=dec(price)+'<span style="font-size:13px;font-family:var(--body);color:var(--soft)">'+interval+'</span>';
        }
        btn.textContent='Activate '+(CYCLE==='annual'?'(annual)':'(monthly)');
      });
    });
  }

  /* ── available apps ───────────────────────────────── */
  var _availableAppsCache=null;
  async function loadAvailableApps(activeIds){
    try{
      var r=await fetch('/api/apps');
      var j=await r.json();
      _availableAppsCache=(j.apps||[]).filter(function(a){return (a.tier==='paid'||a.tier==='metered')&&!activeIds.has(a.id);});
      var body=$('avail-apps-body'); if(!body) return;
      if(!_availableAppsCache.length){
        body.innerHTML='<p style="color:var(--soft);font-size:14px">All available apps are already active on this site.</p>';
        return;
      }
      body.innerHTML=_availableAppsCache.map(function(app){
        var price=CYCLE==='annual'?(app.price_annual_aud||0):(app.price_monthly_aud||0);
        var interval=CYCLE==='annual'?'/yr':'/mo';
        return '<div class="app-row">'
          +'<div class="app-icon"><svg viewBox="0 0 24 24"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"/></svg></div>'
          +'<div class="app-info">'
          +'<div class="app-name">'+esc(app.name)+'</div>'
          +'<div class="app-meta">'+esc(app.tagline||'')+(app.api_dependency?' &middot; Requires: '+esc(app.api_dependency):'')+'</div>'
          +'</div>'
          +'<div class="app-price">'+dec(price)+'<span style="font-size:13px;font-family:var(--body);color:var(--soft)">'+interval+'</span></div>'
          +'<div class="app-actions">'
          +'<button class="btn sm primary" data-activate="'+esc(app.id)+'">Activate '+(CYCLE==='annual'?'(annual)':'(monthly)')+'</button>'
          +'</div></div>';
      }).join('');
      // wire activate buttons
      body.querySelectorAll('[data-activate]').forEach(function(btn){
        btn.addEventListener('click',async function(){
          btn.disabled=true;btn.textContent='Processing\u2026';
          try{
            var r2=await billFetch('/api/billing/app-checkout',{method:'POST',
              body:JSON.stringify({siteId:selectedSiteId,appId:btn.getAttribute('data-activate'),
                cycle:CYCLE,returnUrl:location.origin})});
            var j2=await r2.json();
            if(j2&&j2.url) location.href=j2.url;
            else if(j2&&j2.mode==='added'){$('success-msg').textContent='App activated.';$('success-banner').classList.remove('hidden');loadBilling();}
            else{btn.disabled=false;btn.textContent='Activate';alert(j2&&j2.error||'Could not activate');}
          }catch(e){btn.disabled=false;btn.textContent='Activate';}
        });
      });
    }catch(e){
      var b=$('avail-apps-body');if(b)b.innerHTML='<p style="color:var(--soft)">Could not load available apps.</p>';
    }
  }

  boot();
})();
</script>
</body>
</html>
